{% extends "base.html" %}

{% block title %}Login | Notes Management System{% endblock %}

{% block css %}
<style>
    .login-card {
        max-width: 400px;
        margin: 60px auto;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        background: #fff;
        padding: 30px;
    }

    .login-card h3 {
        text-align: center;
        margin-bottom: 20px;
    }

    .login-card .form-control {
        margin-bottom: 15px;
    }

    .login-card .btn-primary {
        width: 100%;
    }

    .links {
        text-align: center;
        margin-top: 15px;
        text-decoration: none;
    }

    @media (max-width: 576px) {
        .login-card {
            margin: 35px 15px;
            padding: 22px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="login-card">
        <h3>Login</h3>

        <form method="POST" action="/">
            <input type="email" name="email" class="form-control" placeholder="Email ID" required>

            <input type="password" name="password" class="form-control" placeholder="Password" required>

            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <div class="links">
            <a href="/forgot">Forgot Password?</a><br>
            Don't have an accont? <a href="/register">Create Account</a>
        </div>
    </div>
</div>
{% endblock %}
