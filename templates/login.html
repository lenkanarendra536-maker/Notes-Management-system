{% extends "base.html" %}

{% block title %}Login | Notes Management System{% endblock %}

{% block css %}
<style>
    .login-card {
        max-width: 400px;
        margin: 60px auto;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        background: #fff;
        padding: 30px;
    }

    .login-card h3 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: 700;
        color: #0f172a;
    }

    .login-card .form-control {
        margin-bottom: 15px;
        height: 48px;
        border-radius: 8px;
    }

    .login-card .btn-primary {
        width: 100%;
        height: 48px;
        border-radius: 8px;
        font-weight: 600;
    }

    .links {
        text-align: center;
        margin-top: 18px;
        font-size: 15px;
        color: #64748b;
        line-height: 1.8;
    }

    .links a {
        text-decoration: none;
        color: #2563eb;
        font-weight: 600;
        transition: 0.3s ease;
    }

    .links a:hover {
        color: #1d4ed8;
        text-decoration: underline;
    }

    @media (max-width: 576px) {
        .login-card {
            margin: 35px 15px;
            padding: 22px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="login-card">
        <h3>Login</h3>

        <form method="POST" action="/">
            <input type="email" name="email" class="form-control" placeholder="Email ID" required>

            <input type="password" name="password" class="form-control" placeholder="Password" required>

            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <div class="links">
            <a href="/forgot">Forgot Password?</a><br>
            Don't have an account?
            <a href="/register">Create Account</a>
        </div>
    </div>
</div>
{% endblock %}
