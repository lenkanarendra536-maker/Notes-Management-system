{% extends "base.html" %}

{% block title %}Contact | Notes Management System{% endblock %}

{% block css %}
<style>


.contact-container {
display: flex;
justify-content: center;
align-items: center;
min-height: 80vh;
padding: 20px;
}

.contact-card {
width: 100%;
max-width: 520px;
padding: 35px;
border-radius: 18px;
background: rgba(255, 255, 255, 0.95);
box-shadow: 0 15px 40px rgba(0,0,0,0.3);
transition: 0.3s;
}

.contact-card:hover {
transform: translateY(-5px);
}

.contact-card h2 {
text-align: center;
margin-bottom: 25px;
font-weight: 600;
}

.form-control {
border-radius: 10px;
height: 45px;
}

textarea.form-control {
height: 110px;
}

.form-control:focus {
box-shadow: 0 0 8px rgba(13,110,253,0.4);
border-color: #0d6efd;
}

.btn-send {
border-radius: 25px;
font-weight: 600;
padding: 10px;
transition: 0.3s;
}

.btn-send:hover {
background-color: #0a58ca;
}

/* Responsive */
@media (max-width: 768px) {
.contact-container {
min-height: auto;
padding: 15px;
}

.contact-card {
padding: 20px;
border-radius: 12px;
}

.contact-card h2 {
font-size: 22px;
}

.btn-send {
width: 100%;
}
}

@media (max-width: 576px) {
.contact-card {
padding: 15px;
}

.contact-card h2 {
font-size: 20px;
}

.form-control {
font-size: 14px;
}

textarea.form-control {
height: 90px;
}
}
</style>
{% endblock %}

{% block content %}
<div class="container contact-container">
    <div class="contact-card">

        <h2>
            <i class="fas fa-envelope text-primary"></i> Contact Us
        </h2>

        <form method="POST">
            <input type="text" class="form-control mb-3" placeholder="Full Name" name="name" required>

            <input type="email" class="form-control mb-3" placeholder="Email Address" name="email" required>

            <input type="tel" class="form-control mb-3" placeholder="Phone Number" name="phone" required>

            <textarea class="form-control mb-3" name="message" placeholder="Your Message" required></textarea>

            <button class="btn btn-primary w-100 btn-send">
                <i class="fas fa-paper-plane"></i> Send Message
            </button>
        </form>

    </div>
</div>
{% endblock %}
