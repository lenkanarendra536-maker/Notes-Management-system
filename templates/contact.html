<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Notes Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f2c3e, #2e4a6f);
        }

        /* Layout Fix */
        .wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1;
        }

        /* 🔷 Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 12px 0;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            color: white !important;
            font-weight: 600;
        }

        .navbar-brand img {
            height: 35px;
            margin-right: 10px;
        }

        .nav-link {
            color: white !important;
            margin-left: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #0d6efd !important;
        }

        /* 🔷 Contact Section */
        .contact-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .contact-card {
            width: 100%;
            max-width: 520px;
            padding: 35px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .contact-card:hover {
            transform: translateY(-5px);
        }

        .contact-card h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .form-control {
            border-radius: 10px;
            height: 45px;
        }

        textarea.form-control {
            height: 110px;
        }

        .form-control:focus {
            box-shadow: 0 0 8px rgba(13,110,253,0.4);
            border-color: #0d6efd;
        }

        .btn-send {
            border-radius: 25px;
            font-weight: 600;
            padding: 10px;
            transition: 0.3s;
        }

        .btn-send:hover {
            background-color: #0a58ca;
        }

        /* 🔷 Footer */
        footer {
            background: rgba(0,0,0,0.9);
            color: #bbb;
            text-align: center;
            padding: 12px 0;
            font-size: 14px;
            margin-top: 0;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- 🔷 Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">

            <a class="navbar-brand" href="/">
                <img src="https://cdn-icons-png.flaticon.com/512/5063/5063397.png">
                Notes Management System
            </a>

            <div class="ms-auto">
                <a class="nav-link d-inline" href="/">Home</a>
                <a class="nav-link d-inline" href="/about">About</a>
                <a class="nav-link d-inline" href="/contact">Contact</a>
            </div>
        </div>
    </nav>

    <!-- 🔷 Content -->
    <div class="content">
        <div class="container contact-container">
            <div class="contact-card">

                <h2><i class="fas fa-envelope text-primary"></i> Contact Us</h2>

                <form method="post">
                    <input type="text" class="form-control mb-3" placeholder="Full Name" name="name" required>

                    <input type="email" class="form-control mb-3" placeholder="Email Address" name="email" required>

                    <input type="tel" class="form-control mb-3" placeholder="Phone Number" name="phone" required>

                    <textarea class="form-control mb-3" name="message" placeholder="Your Message" required></textarea>

                    <button class="btn btn-primary w-100 btn-send">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                </form>

            </div>
        </div>
    </div>

    <!-- 🔷 Footer -->
    <footer class="bg-black text-white">
        <div class="container text-center p-3">
            
            <p class="mb-1">Manage your notes securely and efficiently</p>
            <small>© 2026 | Developed by You using Flask & MySQL</small>
        </div>
    </footer>

</div>

</body>
</html>
