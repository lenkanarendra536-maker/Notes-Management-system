{% extends "base.html" %}

{% block title %}Verify OTP | Notes Management System{% endblock %}

{% block css %}
<style>
.otp-container {
    margin-top: 50px;
    margin-bottom: 50px;
}

.otp-card {
    background: white;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    text-align: center;
}

.otp-card h3 {
    font-weight: 600;
    margin-bottom: 15px;
}

.otp-input {
    letter-spacing: 10px;
    font-size: 22px;
    text-align: center;
    border-radius: 8px;
    padding: 10px;
}

.btn-success {
    border-radius: 8px;
    padding: 10px;
    font-weight: 500;
}

.btn-success:hover {
    background-color: #146c43;
}

.otp-card a {
    text-decoration: none;
    font-size: 14px;
}

.otp-card a:hover {
    text-decoration: underline;
}

/* Responsive */
@media (max-width: 768px) {
    .otp-container {
        margin-top: 25px;
        padding: 0 10px;
    }

    .otp-card {
        padding: 20px;
        border-radius: 10px;
    }

    .otp-card h3 {
        font-size: 20px;
    }

    .otp-input {
        font-size: 18px;
        letter-spacing: 6px;
    }

    .btn-success {
        width: 100%;
    }
}

@media (max-width: 576px) {
    .otp-card {
        padding: 15px;
    }

    .otp-card h3 {
        font-size: 18px;
    }

    .otp-input {
        font-size: 16px;
        letter-spacing: 4px;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="container otp-container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <div class="otp-card">
                <h3>
                    <i class="fas fa-shield-alt text-success"></i> Verify OTP
                </h3>

                <p class="text-muted mb-4">
                    Enter the OTP sent to your email
                </p>

                <form method="POST">
                    <input type="text" name="otp" maxlength="6"
                           class="form-control mb-3 otp-input"
                           placeholder="------" required>

                    <button class="btn btn-success w-100">
                        Verify OTP
                    </button>
                </form>

                <p class="mt-3 mb-0">
                    Didn’t receive OTP? <a href="/forgot">Resend</a>
                </p>
            </div>

        </div>
    </div>
</div>
{% endblock %}
