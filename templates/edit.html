{% extends "base.html" %}

{% block title %}Edit Note | Notes Management System{% endblock %}

{% block css %}
<style>
.form-container {
    margin-top: 50px;
    margin-bottom: 50px;
}

.form-card {
    background: white;
    padding: 35px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.form-title {
    font-weight: 600;
    margin-bottom: 20px;
}

.form-control {
    border-radius: 8px;
    padding: 10px;
}

textarea {
    resize: none;
}

.btn-warning, .btn-secondary {
    border-radius: 8px;
    padding: 10px;
    font-weight: 500;
}

/* Responsive */
@media (max-width: 768px) {
    .form-container {
        margin-top: 25px;
        padding: 0 10px;
    }

    .form-card {
        padding: 20px;
        border-radius: 10px;
    }

    .form-title {
        font-size: 20px;
    }

    .btn-warning,
    .btn-secondary {
        width: 100%;
    }
}

@media (max-width: 576px) {
    .form-card {
        padding: 15px;
    }

    .form-title {
        font-size: 18px;
    }

    .form-control {
        font-size: 14px;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="container form-container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="form-card">

                <h3 class="form-title text-center">
                    <i class="fas fa-edit text-warning"></i> Edit Note
                </h3>

                <form method="POST">
                    <input type="text" name="title"
                           value="{{ note.title }}"
                           class="form-control mb-3" required>

                    <textarea name="content"
                              class="form-control mb-3"
                              rows="6" required>{{ note.content }}</textarea>

                    <div class="d-grid gap-2">
                        <button class="btn btn-warning">
                            <i class="fas fa-save"></i> Update Note
                        </button>

                        <a href="/viewall" class="btn btn-secondary">
                            Cancel
                        </a>
                    </div>
                </form>

            </div>

        </div>
    </div>
</div>
{% endblock %}
