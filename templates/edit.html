<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Note | Notes Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: linear-gradient(to right, #eef2f7, #f8f9fa);
            font-family: 'Segoe UI', sans-serif;
        }

        .wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(90deg, #ffc107, #e0a800);
            padding: 12px 0;
        }

        .navbar-brand {
            font-weight: bold;
            color: #000 !important;
            display: flex;
            align-items: center;
        }

        .navbar-brand img {
            width: 35px;
            margin-right: 10px;
        }

        .nav-link {
            color: #000 !important;
            font-weight: 500;
            margin-left: 20px;
        }

        .nav-link:hover {
            color: #333 !important;
        }

        /* Card */
        .form-card {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .form-title {
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px;
        }

        textarea {
            resize: none;
        }

        .btn-warning, .btn-secondary {
            border-radius: 8px;
            padding: 10px;
            font-weight: 500;
        }

        .btn-warning:hover {
            background-color: #d39e00;
        }

        footer {
            margin-top: 0;
        }

        /* 🔷 Responsive */

        /* Tablet */
        @media (max-width: 992px) {
            .form-card {
                padding: 25px;
            }

            .navbar-brand {
                font-size: 18px;
            }

            .nav-link {
                margin-left: 10px;
                font-size: 14px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {

            .navbar {
                text-align: center;
            }

            .navbar .container {
                flex-direction: column;
            }

            .navbar-brand {
                justify-content: center;
                margin-bottom: 10px;
            }

            .ms-auto {
                width: 100%;
                text-align: center;
            }

            .nav-link {
                display: block !important;
                margin: 8px 0;
            }

            .container.mt-5 {
                margin-top: 20px !important;
                padding: 0 10px;
            }

            .form-card {
                padding: 20px;
                border-radius: 10px;
            }

            .form-title {
                font-size: 20px;
            }

            .btn-warning,
            .btn-secondary {
                width: 100%;
            }
        }

        /* Small Mobile */
        @media (max-width: 576px) {

            .form-card {
                padding: 15px;
            }

            .form-title {
                font-size: 18px;
            }

            .form-control {
                font-size: 14px;
            }

            footer p {
                font-size: 14px;
            }

            footer small {
                font-size: 12px;
            }
        }

        /* Extra Small */
        @media (max-width: 400px) {

            .navbar-brand {
                font-size: 16px;
            }

            .navbar-brand img {
                width: 28px;
            }

            .form-title {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <img src="https://cdn-icons-png.flaticon.com/512/5063/5063397.png" alt="logo">
                Notes Management
            </a>

            <div class="ms-auto">
                <a class="nav-link d-inline" href="/addnote">Add Notes</a>
                <a class="nav-link d-inline" href="/dashboard">Dashboard</a>
                <a class="nav-link d-inline text-danger" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="content">
        <div class="container mt-5">
            <div class="col-md-6 mx-auto">
                <div class="form-card">
                    <h3 class="form-title text-center">Edit Note</h3>

                    <form method="POST">
                        <input type="text" name="title"
                               value="{{ note.title }}"
                               class="form-control mb-3" required>

                        <textarea name="content"
                                  class="form-control mb-3"
                                  rows="6" required>{{ note.content }}</textarea>

                        <div class="d-grid gap-2">
                            <button class="btn btn-warning">
                                <i class="fas fa-save"></i> Update Note
                            </button>

                            <a href="/viewall" class="btn btn-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-warning text-dark">
        <div class="container text-center p-3">
            <p class="mb-1">Manage your notes securely and efficiently</p>
            <small>© 2026 | Developed by You using Flask & MySQL</small>
        </div>
    </footer>

</div>

</body>
</html>
