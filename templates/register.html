{% extends "base.html" %}

{% block title %}Register | Notes Management System{% endblock %}

{% block css %}
<style>
.register-container {
    margin-top: 50px;
    margin-bottom: 50px;
}

.register-card {
    background: #fff;
    padding: 35px;
    border-radius: 14px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.register-card h3 {
    font-weight: 700;
    margin-bottom: 22px;
    color: #0f172a;
}

.register-card .form-control {
    border-radius: 8px;
    padding: 12px;
    height: 48px;
    font-size: 15px;
}

.register-card .btn-primary {
    border-radius: 8px;
    padding: 10px;
    height: 48px;
    font-weight: 600;
    font-size: 16px;
}

.register-card .btn-primary:hover {
    background-color: #1d4ed8;
}

.register-card p {
    color: #64748b;
    font-size: 15px;
}

.register-card a {
    text-decoration: none;
    color: #2563eb;
    font-weight: 600;
    transition: 0.3s ease;
}

.register-card a:hover {
    color: #1d4ed8;
    text-decoration: underline;
}

@media (max-width: 768px) {
    .register-container {
        margin-top: 25px;
        padding: 0 10px;
    }

    .register-card {
        padding: 22px;
        border-radius: 12px;
    }

    .register-card h3 {
        font-size: 22px;
    }
}

@media (max-width: 576px) {
    .register-card {
        padding: 18px;
    }

    .register-card h3 {
        font-size: 20px;
    }

    .register-card .form-control {
        font-size: 14px;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="container register-container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">

            <div class="register-card">
                <h3 class="text-center">
                    <i class="fas fa-user-plus text-primary"></i> Create Account
                </h3>

                <form method="POST">

                    <input type="text"
                           name="username"
                           class="form-control mb-3"
                           placeholder="Username"
                           required>

                    <input type="email"
                           name="email"
                           class="form-control mb-3"
                           placeholder="Email Address"
                           required>

                    <input type="password"
                           name="password"
                           class="form-control mb-3"
                           placeholder="Password"
                           required>

                    <button class="btn btn-primary w-100">
                        Register
                    </button>

                </form>

                <p class="text-center mt-3 mb-0">
                    Already have an account?
                    <a href="/">Login</a>
                </p>

            </div>

        </div>
    </div>
</div>
{% endblock %}
