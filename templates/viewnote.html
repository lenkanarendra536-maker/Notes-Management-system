{% extends "base.html" %}

{% block title %}View Note | Notes Management System{% endblock %}

{% block css %}
<style>
.view-note-container {
    margin-top: 50px;
    margin-bottom: 50px;
}

.note-container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.note-title {
    font-weight: 600;
    word-wrap: break-word;
}

.note-date {
    font-size: 14px;
    color: gray;
}

.note-content {
    margin-top: 20px;
    line-height: 1.6;
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;
}

.btn-secondary {
    border-radius: 8px;
    padding: 8px 15px;
}

@media (max-width: 768px) {
    .view-note-container {
        margin-top: 25px;
        padding: 0 10px;
    }

    .note-container {
        padding: 20px;
    }
}

@media (max-width: 480px) {
    .note-title {
        font-size: 20px;
    }

    .note-date {
        font-size: 12px;
    }

    .note-content {
        font-size: 14px;
    }

    .btn-secondary {
        font-size: 13px;
        padding: 6px 12px;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="container view-note-container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">

            <div class="note-container">

                <h3 class="note-title">{{ note.title }}</h3>
                <p class="note-date">{{ note.created_at }}</p>

                <hr>

                <div class="note-content">
                    {{ note.content }}
                </div>

                <div class="mt-4">
                    <a href="/viewall" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Back
                    </a>
                </div>

            </div>

        </div>
    </div>
</div>
{% endblock %}
