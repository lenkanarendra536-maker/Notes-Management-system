<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Note | Notes Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: linear-gradient(to right, #eef2f7, #f8f9fa);
            font-family: 'Segoe UI', sans-serif;
        }

        /* Layout Fix */
        .wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(90deg, #0d6efd, #0a58ca);
            padding: 12px 0;
        }

        .navbar-brand {
            font-weight: bold;
            color: white !important;
            display: flex;
            align-items: center;
        }

        .navbar-brand img {
            width: 35px;
            margin-right: 10px;
        }

        .nav-link {
            color: white !important;
            font-weight: 500;
            margin-left: 20px;
        }

        .nav-link:hover {
            color: #dcdcdc !important;
        }

        /* Note Card */
        .note-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .note-title {
            font-weight: 600;
        }

        .note-date {
            font-size: 14px;
            color: gray;
        }

        .note-content {
            margin-top: 20px;
            line-height: 1.6;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .btn-secondary {
            border-radius: 8px;
            padding: 8px 15px;
        }

        footer {
            margin-top: 0;
        }

        /* =========================
           RESPONSIVE MEDIA QUERIES
           ========================= */

        /* Tablets */
        @media (max-width: 992px) {
            .nav-link {
                margin-left: 10px;
            }

            .note-container {
                padding: 25px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .navbar .container {
                flex-direction: column;
                align-items: flex-start;
            }

            .ms-auto {
                width: 100%;
                margin-top: 10px;
            }

            .nav-link {
                display: block;
                margin: 5px 0;
            }

            .col-md-8 {
                width: 100%;
            }

            .note-container {
                padding: 20px;
            }
        }

        /* Small Mobile */
        @media (max-width: 480px) {
            .note-title {
                font-size: 20px;
            }

            .note-date {
                font-size: 12px;
            }

            .note-content {
                font-size: 14px;
            }

            .btn-secondary {
                font-size: 13px;
                padding: 6px 12px;
            }

            footer p {
                font-size: 14px;
            }

            footer small {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <img src="https://cdn-icons-png.flaticon.com/512/5063/5063397.png" alt="logo">
                Notes Management
            </a>

            <div class="ms-auto">
                <a class="nav-link d-inline" href="/dashboard">Dashboard</a>
                <a class="nav-link d-inline" href="/addnote">Add Notes</a>
                <a class="nav-link d-inline text-warning" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="content">
        <div class="container mt-5">
            <div class="col-md-8 mx-auto">
                <div class="note-container">

                    <h3 class="note-title">{{ note.title }}</h3>
                    <p class="note-date">{{ note.created_at }}</p>

                    <hr>

                    <div class="note-content">
                        {{ note.content }}
                    </div>

                    <div class="mt-4">
                        <a href="/viewall" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Back
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-primary text-white">
        <div class="container text-center p-3">
            <p class="mb-1">Manage your notes securely and efficiently</p>
            <small>© 2026 | Developed by You using Flask & MySQL</small>
        </div>
    </footer>

</div>

</body>
</html>
