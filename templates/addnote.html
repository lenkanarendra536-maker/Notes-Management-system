<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Note | Notes Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: linear-gradient(to right, #eef2f7, #f8f9fa);
            font-family: 'Segoe UI', sans-serif;
        }

        .wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(90deg, #0d6efd, #0a58ca);
            padding: 12px 0;
        }

        .navbar-brand {
            font-weight: bold;
            color: white !important;
            display: flex;
            align-items: center;
        }

        .navbar-brand img {
            width: 35px;
            margin-right: 10px;
        }

        .nav-link {
            color: white !important;
            font-weight: 500;
            margin-left: 20px;
        }

        .nav-link:hover {
            color: #dcdcdc !important;
        }

        /* Form Card */
        .form-card {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .form-title {
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px;
        }

        textarea {
            resize: none;
        }

        .btn-success {
            border-radius: 8px;
            padding: 10px;
            font-weight: 500;
        }

        .btn-success:hover {
            background-color: #146c43;
        }

        footer {
            margin-top: 0;
        }

        /* 🔷 Responsive */

        @media (max-width: 992px) {
            .form-card {
                padding: 25px;
            }

            .navbar-brand {
                font-size: 18px;
            }

            .nav-link {
                margin-left: 10px;
                font-size: 14px;
            }
        }

        @media (max-width: 768px) {

            .navbar {
                text-align: center;
            }

            .navbar .container {
                flex-direction: column;
            }

            .navbar-brand {
                justify-content: center;
                margin-bottom: 10px;
            }

            .ms-auto {
                width: 100%;
                text-align: center;
            }

            .nav-link {
                display: block !important;
                margin: 8px 0;
            }

            .content .container {
                margin-top: 20px !important;
                padding: 0 10px;
            }

            .form-card {
                padding: 20px;
                border-radius: 10px;
            }

            .form-title {
                font-size: 20px;
            }

            .btn-success {
                width: 100%;
            }
        }

        @media (max-width: 576px) {

            .form-card {
                padding: 15px;
            }

            .form-title {
                font-size: 18px;
            }

            .form-control {
                font-size: 14px;
            }

            footer p {
                font-size: 14px;
            }

            footer small {
                font-size: 12px;
            }
        }

        @media (max-width: 400px) {

            .navbar-brand {
                font-size: 16px;
            }

            .navbar-brand img {
                width: 28px;
            }

            .form-title {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <img src="https://cdn-icons-png.flaticon.com/512/5063/5063397.png" alt="logo">
                Notes Management System
            </a>

            <div class="ms-auto">
                <a class="nav-link d-inline" href="/dashboard">Dashboard</a>
                <a class="nav-link d-inline text-warning" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="content">
        <div class="container mt-5">
            <div class="col-md-6 mx-auto">
                <div class="form-card">
                    <h3 class="form-title text-center">Add New Note</h3>

                    <form action="/addnote" method="POST">
                        <input type="text" name="title"
                               class="form-control mb-3"
                               placeholder="Enter title" required>

                        <textarea name="content"
                                  class="form-control mb-3"
                                  rows="6"
                                  placeholder="Write your note here..." required></textarea>

                        <button class="btn btn-success w-100">
                            <i class="fas fa-save"></i> Save Note
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-primary text-white">
        <div class="container text-center p-3">
            <p class="mb-1">Manage your notes securely and efficiently</p>
            <small>© 2026 | Developed by You using Flask & MySQL</small>
        </div>
    </footer>

</div>

</body>
</html>
