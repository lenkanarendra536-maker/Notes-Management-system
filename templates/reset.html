<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Notes Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Layout Fix */
        .wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(90deg, #ffc107, #e0a800);
            padding: 12px 0;
        }

        .navbar-brand {
            font-weight: bold;
            color: #000 !important;
            display: flex;
            align-items: center;
        }

        .navbar-brand img {
            width: 35px;
            margin-right: 10px;
        }

        .nav-link {
            color: #000 !important;
            font-weight: 500;
            margin-left: 15px;
        }

        .nav-link:hover {
            color: #333 !important;
        }

        /* Card */
        .reset-card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .reset-card h3 {
            font-weight: 600;
            margin-bottom: 15px;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px;
        }

        .btn-warning {
            border-radius: 8px;
            padding: 10px;
            font-weight: 500;
        }

        .btn-warning:hover {
            background-color: #d39e00;
        }

        .form-text {
            font-size: 13px;
        }

        a {
            text-decoration: none;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 0;
        }

        /* =========================
           RESPONSIVE MEDIA QUERIES
           ========================= */

        /* Tablets */
        @media (max-width: 992px) {
            .reset-card {
                padding: 30px;
            }

            .nav-link {
                margin-left: 10px;
            }
        }

        /* Mobile Devices */
        @media (max-width: 768px) {
            .reset-card {
                padding: 25px;
            }

            .container {
                padding-left: 20px;
                padding-right: 20px;
            }

            .navbar .container {
                flex-direction: column;
                align-items: flex-start;
            }

            .ms-auto {
                width: 100%;
                margin-top: 10px;
            }

            .nav-link {
                display: block;
                margin: 5px 0;
            }

            .col-md-5 {
                width: 100%;
            }
        }

        /* Small Mobile */
        @media (max-width: 480px) {
            .reset-card {
                padding: 20px;
            }

            .reset-card h3 {
                font-size: 20px;
            }

            .form-control {
                font-size: 14px;
                padding: 8px;
            }

            .btn-warning {
                font-size: 14px;
                padding: 8px;
            }

            footer p {
                font-size: 14px;
            }

            footer small {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="https://cdn-icons-png.flaticon.com/512/5063/5063397.png" alt="logo">
                Notes Management
            </a>

            <div class="ms-auto">
                <a class="nav-link d-inline" href="/">Home</a>
                <a class="nav-link d-inline" href="/about">About</a>
                <a class="nav-link d-inline" href="/contact">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="content">
        <div class="container mt-5">
            <div class="col-md-5 mx-auto">
                <div class="reset-card">
                    <h3 class="text-center">Reset Password</h3>

                    <p class="text-muted text-center mb-4">
                        Create a new secure password for your account
                    </p>

                    <form method="POST">
                        <input type="password" name="password"
                               class="form-control mb-3"
                               placeholder="New Password" required>

                        <input type="password" name="confirm_password"
                               class="form-control mb-2"
                               placeholder="Confirm Password" required>

                        <div class="form-text mb-3">
                            Password should be at least 6 characters long
                        </div>

                        <button class="btn btn-warning w-100">Update Password</button>
                    </form>

                    <p class="text-center mt-3">
                        Back to <a href="/">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-warning text-dark">
        <div class="container text-center p-3">
            <p class="mb-1">Manage your notes securely and efficiently</p>
            <small>© 2026 | Developed by You using Flask & MySQL</small>
        </div>
    </footer>

</div>

</body>
</html>
