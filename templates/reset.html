{% extends "base.html" %}

{% block title %}Reset Password | Notes Management System{% endblock %}

{% block css %}
<style>
.reset-container {
    margin-top: 50px;
    margin-bottom: 50px;
}

.reset-card {
    background: white;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.reset-card h3 {
    font-weight: 600;
    margin-bottom: 15px;
}

.form-control {
    border-radius: 8px;
    padding: 10px;
}

.btn-warning {
    border-radius: 8px;
    padding: 10px;
    font-weight: 500;
}

.btn-warning:hover {
    background-color: #d39e00;
}

.form-text {
    font-size: 13px;
}

.reset-card a {
    text-decoration: none;
    font-size: 14px;
}

.reset-card a:hover {
    text-decoration: underline;
}

/* Responsive */
@media (max-width: 768px) {
    .reset-container {
        margin-top: 25px;
        padding: 0 10px;
    }

    .reset-card {
        padding: 25px;
    }
}

@media (max-width: 480px) {
    .reset-card {
        padding: 20px;
    }

    .reset-card h3 {
        font-size: 20px;
    }

    .form-control {
        font-size: 14px;
        padding: 8px;
    }

    .btn-warning {
        font-size: 14px;
        padding: 8px;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="container reset-container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">

            <div class="reset-card">
                <h3 class="text-center">
                    <i class="fas fa-lock text-warning"></i> Reset Password
                </h3>

                <p class="text-muted text-center mb-4">
                    Create a new secure password for your account
                </p>

                <form method="POST">
                    <input type="password" name="password"
                           class="form-control mb-3"
                           placeholder="New Password" required>

                    <input type="password" name="confirm_password"
                           class="form-control mb-2"
                           placeholder="Confirm Password" required>

                    <div class="form-text mb-3">
                        Password should be at least 6 characters long
                    </div>

                    <button class="btn btn-warning w-100">
                        Update Password
                    </button>
                </form>

                <p class="text-center mt-3 mb-0">
                    Back to <a href="/">Login</a>
                </p>
            </div>

        </div>
    </div>
</div>
{% endblock %}
