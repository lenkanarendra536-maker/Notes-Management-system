<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Notes Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(90deg, #0d6efd, #0a58ca);
            padding: 12px 0;
        }

        .navbar-brand {
            font-weight: bold;
            color: white !important;
            display: flex;
            align-items: center;
        }

        .navbar-brand img {
            width: 35px;
            margin-right: 10px;
        }

        .nav-link {
            color: white !important;
            font-weight: 500;
            margin-left: 15px;
        }

        .nav-link:hover {
            color: #dcdcdc !important;
        }

        /* Card */
        .forgot-card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .forgot-card h3 {
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px;
        }

        .btn-primary {
            border-radius: 8px;
            padding: 10px;
            font-weight: 500;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
        }

        a {
            text-decoration: none;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 0;
        }

        /* 🔷 Responsive */

        /* Tablet */
        @media (max-width: 992px) {
            .forgot-card {
                padding: 25px;
            }

            .navbar-brand {
                font-size: 18px;
            }

            .nav-link {
                margin-left: 10px;
                font-size: 14px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {

            .navbar {
                text-align: center;
            }

            .navbar .container {
                flex-direction: column;
            }

            .navbar-brand {
                justify-content: center;
                margin-bottom: 10px;
            }

            .ms-auto {
                width: 100%;
                text-align: center;
            }

            .nav-link {
                display: block !important;
                margin: 8px 0;
            }

            .container.mt-5 {
                margin-top: 20px !important;
                padding: 0 10px;
            }

            .forgot-card {
                padding: 20px;
                border-radius: 10px;
            }

            .forgot-card h3 {
                font-size: 20px;
            }

            .btn-primary {
                width: 100%;
            }
        }

        /* Small Mobile */
        @media (max-width: 576px) {

            .forgot-card {
                padding: 15px;
            }

            .forgot-card h3 {
                font-size: 18px;
            }

            .form-control {
                font-size: 14px;
            }

            footer p {
                font-size: 14px;
            }

            footer small {
                font-size: 12px;
            }
        }

        /* Extra Small */
        @media (max-width: 400px) {

            .navbar-brand {
                font-size: 16px;
            }

            .navbar-brand img {
                width: 28px;
            }

            .forgot-card h3 {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="https://cdn-icons-png.flaticon.com/512/5063/5063397.png" alt="logo">
                Notes Management
            </a>

            <div class="ms-auto">
                <a class="nav-link d-inline" href="/">Home</a>
                <a class="nav-link d-inline" href="/about">About</a>
                <a class="nav-link d-inline" href="/contact">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="content">
        <div class="container mt-5">
            <div class="col-md-5 mx-auto">
                <div class="forgot-card">
                    <h3 class="text-center">Forgot Password</h3>

                    <p class="text-muted text-center mb-4">
                        Enter your registered email to receive an OTP
                    </p>

                    <form method="POST">
                        <input type="email" name="email"
                               class="form-control mb-3"
                               placeholder="Enter your email" required>

                        <button class="btn btn-primary w-100">Send OTP</button>
                    </form>

                    <p class="text-center mt-3">
                        Remember your password? <a href="/">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-primary text-white">
        <div class="container text-center p-3">
            <p class="mb-1">Manage your notes securely and efficiently</p>
            <small>© 2026 | Developed by You using Flask & MySQL</small>
        </div>
    </footer>

</div>

</body>
</html>
