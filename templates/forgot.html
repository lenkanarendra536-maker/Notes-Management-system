{% extends "base.html" %}

{% block title %}Forgot Password | Notes Management System{% endblock %}

{% block css %}
<style>
.forgot-container {
    margin-top: 50px;
    margin-bottom: 50px;
}

.forgot-card {
    background: white;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.forgot-card h3 {
    font-weight: 600;
    margin-bottom: 20px;
}

.form-control {
    border-radius: 8px;
    padding: 10px;
}

.btn-primary {
    border-radius: 8px;
    padding: 10px;
    font-weight: 500;
}

.btn-primary:hover {
    background-color: #0b5ed7;
}

.forgot-card a {
    text-decoration: none;
    font-size: 14px;
}

.forgot-card a:hover {
    text-decoration: underline;
}

/* Responsive */
@media (max-width: 768px) {
    .forgot-container {
        margin-top: 25px;
        padding: 0 10px;
    }

    .forgot-card {
        padding: 20px;
        border-radius: 10px;
    }

    .forgot-card h3 {
        font-size: 20px;
    }

    .btn-primary {
        width: 100%;
    }
}

@media (max-width: 576px) {
    .forgot-card {
        padding: 15px;
    }

    .forgot-card h3 {
        font-size: 18px;
    }

    .form-control {
        font-size: 14px;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="container forgot-container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">

            <div class="forgot-card">
                <h3 class="text-center">
                    <i class="fas fa-key text-primary"></i> Forgot Password
                </h3>

                <p class="text-muted text-center mb-4">
                    Enter your registered email to receive an OTP
                </p>

                <form method="POST">
                    <input type="email" name="email"
                           class="form-control mb-3"
                           placeholder="Enter your email" required>

                    <button class="btn btn-primary w-100">
                        Send OTP
                    </button>
                </form>

                <p class="text-center mt-3 mb-0">
                    Remember your password? <a href="/">Login</a>
                </p>
            </div>

        </div>
    </div>
</div>
{% endblock %}
